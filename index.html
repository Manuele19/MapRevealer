<!DOCTYPE html>
<html lang="eng">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

  #toolbar {
    display: flex; align-items: center; gap: 8px; padding: 8px 14px;
    background: #16213e; border-bottom: 2px solid #0f3460; z-index: 10;
    flex-shrink: 0; flex-wrap: wrap;
  }
  #toolbar button, #toolbar label {
    padding: 6px 14px; border: 2px solid transparent; border-radius: 6px;
    background: #0f3460; color: #eee; cursor: pointer; font-size: 14px;
    transition: all .15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  #toolbar button svg { width: 18px; height: 18px; flex-shrink: 0; }
  #toolbar button:hover { background: #1a4a7a; }
  #toolbar button.active { border-color: #e94560; background: #1a4a7a; }
  #toolbar button[data-tool="green"].active { border-color: #00c853; }
  #toolbar button[data-tool="red"].active { border-color: #ff1744; }
  #toolbar button[data-tool="pen"].active { border-color: #fff; }
  #toolbar button[data-tool="eraser"].active { border-color: #ffab40; }
  #toolbar button[data-tool="rect"].active { border-color: #00b0ff; }
  #toolbar button[data-tool="crop"].active { border-color: #ffc107; }

  #undoBtn, #redoBtn { font-size: 18px; line-height: 1; }
  #undoBtn:disabled, #redoBtn:disabled, #clearCropBtn:disabled { opacity: 0.3; cursor: default; }

  #penColor {
    width: 34px; height: 34px; padding: 1px; border: 2px solid #0f3460;
    border-radius: 6px; background: #0f3460; cursor: pointer;
  }
  #penColor:hover { border-color: #1a4a7a; }

  #sendBtn { background: #e94560 !important; font-weight: bold; }
  #sendBtn:hover { background: #ff6b81 !important; }

  #autoSyncBtn.active { border-color: #00c853; background: #1a4a7a; }
  #autoSyncBtn.active::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: #00c853; box-shadow: 0 0 6px #00c853;
    animation: autoSyncPulse 1.6s ease-in-out infinite;
  }
  @keyframes autoSyncPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  #fileInput { display: none; }
  #fileName {
    color: #aaa; font-size: 13px; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #fileName:empty { display: none; }

  #langSelect {
    padding: 4px 6px; border-radius: 6px; border: 2px solid #0f3460;
    background: #0f3460; color: #eee; font-size: 13px; cursor: pointer;
  }
  #langSelect:hover { background: #1a4a7a; }

  .toolbar-group { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .toolbar-group.output { margin-left: auto; }
  .toolbar-sep {
    width: 1px; align-self: stretch;
    background: #0f3460; opacity: 0.7;
  }

  .brush-control { display: flex; align-items: center; gap: 6px; color: #aaa; font-size: 14px; }
  .brush-control input[type="range"] {
    width: 160px; height: 8px; cursor: pointer;
    accent-color: #e94560;
  }

  #viewport {
    flex: 1; position: relative; overflow: hidden; cursor: default;
  }
  #viewport.drag-over::after {
    content: ''; position: absolute; inset: 12px;
    border: 3px dashed #e94560; border-radius: 12px;
    pointer-events: none; z-index: 150;
  }
  #canvasContainer {
    position: absolute; top: 0; left: 0; transform-origin: 0 0;
  }
  #canvasContainer canvas {
    position: absolute; top: 0; left: 0; display: block;
  }

  #placeholder {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: 22px; color: #555;
    pointer-events: none; text-align: center; padding: 20px;
  }

  #brushCursor {
    position: fixed; border: 2px solid rgba(255,255,255,0.6);
    border-radius: 50%; pointer-events: none; z-index: 100;
    display: none; transform: translate(-50%, -50%);
  }

  #rectPreview {
    position: absolute; pointer-events: none; z-index: 90;
    border: 2px dashed rgba(0,200,0,0.95);
    background: rgba(0,200,0,0.18);
    display: none;
  }
  #rectPreview.crop {
    border-color: rgba(255,193,7,0.95);
    background: rgba(255,193,7,0.12);
  }
  #rectPreview.deselect {
    border-color: rgba(255,23,68,0.95);
    background: rgba(255,23,68,0.18);
  }

  #cropBorder {
    position: absolute; pointer-events: none; z-index: 85;
    border: 2px dashed rgba(255,193,7,0.95);
    box-sizing: border-box;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.28);
    display: none;
  }

  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,200,83,0.95); color: #fff;
    padding: 10px 22px; border-radius: 8px; font-size: 14px;
    pointer-events: none; opacity: 0;
    transition: opacity .18s, transform .18s;
    z-index: 200; box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #resizeDialog {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: none; align-items: center; justify-content: center;
    z-index: 300;
  }
  #resizeDialog.show { display: flex; }
  #resizeBox {
    background: #16213e; border: 2px solid #0f3460; border-radius: 10px;
    padding: 22px 26px; max-width: 480px; min-width: 300px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  #resizeBox h3 { color: #eee; margin-bottom: 10px; font-size: 18px; }
  #resizeBox p { color: #bbb; margin-bottom: 18px; line-height: 1.5; font-size: 14px; }
  #resizeBox .dims { color: #eee; font-family: monospace; }
  #resizeBox .buttons { display: flex; gap: 10px; justify-content: flex-end; }
  #resizeBox button {
    padding: 8px 18px; border: 2px solid #0f3460; border-radius: 6px;
    background: #0f3460; color: #eee; cursor: pointer; font-size: 14px;
    transition: all .15s;
  }
  #resizeBox button:hover { background: #1a4a7a; }
  #rdAccept { background: #e94560; border-color: #e94560; font-weight: bold; }
  #rdAccept:hover { background: #ff6b81; border-color: #ff6b81; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="toolbar-group">
    <input type="file" id="fileInput" accept="image/*">
    <button id="fileBtn" data-i18n-title="fileInputTitle" title="Carica immagine"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span data-i18n="loadFile">Carica</span></button>
    <span id="fileName"></span>
    <input type="file" id="prjInput" accept=".mrp,.json,application/json" style="display:none">
    <button id="loadPrjBtn" data-i18n-title="loadPrjTitle" title="Apri progetto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></button>
    <button id="savePrjBtn" data-i18n-title="savePrjTitle" title="Salva progetto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></button>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <button data-tool="cursor" class="active" title="V / 1"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 2l15 8-7 2-2 7L4 2z"/></svg><span data-i18n="cursor">Cursore</span></button>
    <button data-tool="green" title="S / 2"><svg viewBox="0 0 24 24" fill="none" stroke="#00c853" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 10 18 20 6"/></svg><span data-i18n="green">Seleziona</span></button>
    <button data-tool="red" title="D / 3"><svg viewBox="0 0 24 24" fill="none" stroke="#ff1744" stroke-width="3" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg><span data-i18n="red">Deseleziona</span></button>
    <button data-tool="rect" data-i18n-title="rectTitle" title="R / 6 (Alt: deseleziona)"><svg viewBox="0 0 24 24" fill="none" stroke="#00b0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3 3"><rect x="3" y="5" width="18" height="14" rx="1"/></svg><span data-i18n="rect">Rettangolo</span></button>
    <button data-tool="crop" title="C / 7"><svg viewBox="0 0 24 24" fill="none" stroke="#ffc107" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v16a2 2 0 0 0 2 2h16"/><path d="M2 6h16a2 2 0 0 1 2 2v16"/></svg><span data-i18n="crop">Bordi</span></button>
    <button data-tool="pen" title="P / 4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l3-1 12-12-2-2L4 18l-1 3z"/><path d="M14 6l2 2"/></svg><span data-i18n="pen">Penna</span></button>
    <button data-tool="eraser" title="E / 5"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l9-9 5 5-9 9H5l-2-2z"/><line x1="9" y1="21" x2="21" y2="21"/></svg><span data-i18n="eraser">Gomma</span></button>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <button id="revealAllBtn" data-i18n-title="revealAllTitle" title="Rivela tutto"><svg viewBox="0 0 24 24" fill="none" stroke="#00c853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
    <button id="hideAllBtn" data-i18n-title="hideAllTitle" title="Nascondi tutto"><svg viewBox="0 0 24 24" fill="none" stroke="#ff1744" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
    <button id="clearCropBtn" data-i18n-title="clearCropTitle" title="Rimuovi bordi" disabled><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v16a2 2 0 0 0 2 2h16" stroke="#ffc107"/><path d="M2 6h16a2 2 0 0 1 2 2v16" stroke="#ffc107"/><line x1="3" y1="3" x2="21" y2="21" stroke="#ff1744"/></svg></button>
    <button id="undoBtn" title="Ctrl+Z"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h11a6 6 0 0 1 0 12h-3"/><polyline points="7 6 3 10 7 14"/></svg></button>
    <button id="redoBtn" title="Ctrl+Y / Ctrl+Shift+Z"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10H10a6 6 0 0 0 0 12h3"/><polyline points="17 6 21 10 17 14"/></svg></button>
  </div>

  <div class="toolbar-sep"></div>

  <div class="toolbar-group">
    <input type="color" id="penColor" value="#000000" data-i18n-title="penColorTitle" title="Colore annotazioni">
    <div class="brush-control">
      <label><span data-i18n="size">Dimensione</span>: <input type="range" id="brushSize" min="0" max="1000" value="400"></label>
      <span id="brushSizeLabel">25</span>
    </div>
  </div>

  <div class="toolbar-group output">
    <button id="exportBtn" data-i18n-title="exportTitle" title="Esporta PNG"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
    <button id="autoSyncBtn" data-i18n-title="autoSyncTitle" title="Sincronizzazione automatica"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg><span data-i18n="autoSync">Auto</span></button>
    <button id="sendBtn" title="Ctrl+S"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg><span data-i18n="send">Invia</span></button>
  </div>

  <div class="toolbar-sep"></div>

  <select id="langSelect"></select>
</div>

<div id="viewport">
  <div id="placeholder" data-i18n="placeholder">Carica un'immagine per iniziare o trascinala qui</div>
  <div id="canvasContainer">
    <canvas id="imageCanvas"></canvas>
    <canvas id="maskCanvas"></canvas>
    <canvas id="annotationCanvas"></canvas>
  </div>
  <div id="rectPreview"></div>
  <div id="cropBorder"></div>
  <div id="brushCursor"></div>
</div>

<div id="toast"></div>

<div id="resizeDialog" role="dialog" aria-modal="true">
  <div id="resizeBox">
    <h3 id="rdTitle">Immagine grande</h3>
    <p id="rdMsg"></p>
    <div class="buttons">
      <button id="rdKeep">Mantieni originale</button>
      <button id="rdAccept">Ridimensiona</button>
    </div>
  </div>
</div>

    const iy1 = Math.max(0, Math.floor(Math.min(y1, y2)));
    const ix2 = Math.min(imgWidth, Math.ceil(Math.max(x1, x2)));
    const iy2 = Math.min(imgHeight, Math.ceil(Math.max(y1, y2)));
    if (ix2 <= ix1 || iy2 <= iy1) return;
    for (let py = iy1; py < iy2; py++) {
      const rowStart = py * imgWidth;
      for (let px = ix1; px < ix2; px++) {
        maskData[rowStart + px] = value;
      }
    }
    renderMaskRegion(ix1, iy1, ix2, iy2);
  }

  function updateRectPreview() {
    if (rectPreviewEl.style.display !== 'block') return;
    const x1 = Math.min(rectStartX, rectCurX);
    const y1 = Math.min(rectStartY, rectCurY);
    const x2 = Math.max(rectStartX, rectCurX);
    const y2 = Math.max(rectStartY, rectCurY);
    rectPreviewEl.style.left = (panX + x1 * scale) + 'px';
    rectPreviewEl.style.top = (panY + y1 * scale) + 'px';
    rectPreviewEl.style.width = ((x2 - x1) * scale) + 'px';
    rectPreviewEl.style.height = ((y2 - y1) * scale) + 'px';
  }

  // --- Pointer events ---
  viewport.addEventListener('pointerdown', (e) => {
    if (!loadedImage) return;
    isDown = true;
    const pos = screenToCanvas(e);
    lastX = pos.x;
    lastY = pos.y;

    if (currentTool === 'cursor') {
      viewport.style.cursor = 'grabbing';
      lastX = e.clientX;
      lastY = e.clientY;
    } else if (currentTool === 'green') {
      saveMaskState();
      stampLine(pos.x, pos.y, pos.x, pos.y, 1);
    } else if (currentTool === 'red') {
      saveMaskState();
      stampLine(pos.x, pos.y, pos.x, pos.y, 0);
    } else if (currentTool === 'rect') {
      rectStartX = pos.x;
      rectStartY = pos.y;
      rectCurX = pos.x;
      rectCurY = pos.y;
      rectPreviewEl.classList.toggle('deselect', e.altKey);
      rectPreviewEl.style.display = 'block';
      updateRectPreview();
    } else if (currentTool === 'crop') {
      rectStartX = pos.x;
      rectStartY = pos.y;
      rectCurX = pos.x;
      rectCurY = pos.y;
      rectPreviewEl.classList.add('crop');
      rectPreviewEl.classList.remove('deselect');
      rectPreviewEl.style.display = 'block';
      updateRectPreview();
    } else if (currentTool === 'pen') {
      saveAnnotationState();
      annotationCtx.globalCompositeOperation = 'source-over';
      annotationCtx.beginPath();
      annotationCtx.moveTo(pos.x, pos.y);
      annotationCtx.strokeStyle = penColor.value;
      annotationCtx.lineWidth = Math.max(2, brushRadius / 4);
      annotationCtx.lineCap = 'round';
      annotationCtx.lineJoin = 'round';
    } else if (currentTool === 'eraser') {
      saveAnnotationState();
      annotationCtx.globalCompositeOperation = 'destination-out';
      annotationCtx.beginPath();
      annotationCtx.moveTo(pos.x, pos.y);
      annotationCtx.strokeStyle = 'rgba(0,0,0,1)';
      annotationCtx.lineWidth = brushRadius;
      annotationCtx.lineCap = 'round';
      annotationCtx.lineJoin = 'round';
    }

    viewport.setPointerCapture(e.pointerId);
  });

  viewport.addEventListener('pointermove', (e) => {
    const pos = screenToCanvas(e);

    // Brush cursor (skip for cursor/rect tools)
    if (currentTool !== 'cursor' && currentTool !== 'rect' && loadedImage) {
      brushCursorEl.style.display = 'block';
      brushCursorEl.style.left = e.clientX + 'px';
      brushCursorEl.style.top = e.clientY + 'px';
      const diameter = effectiveDiameter() * scale;
      brushCursorEl.style.width = diameter + 'px';
      brushCursorEl.style.height = diameter + 'px';

      if (currentTool === 'green') {
        brushCursorEl.style.borderColor = 'rgba(0,200,0,0.8)';
      } else if (currentTool === 'red') {
        brushCursorEl.style.borderColor = 'rgba(200,0,0,0.8)';
      } else if (currentTool === 'eraser') {
        brushCursorEl.style.borderColor = 'rgba(255,171,64,0.8)';
      } else if (currentTool === 'pen') {
        brushCursorEl.style.borderColor = penColor.value;
      } else {
        brushCursorEl.style.borderColor = 'rgba(255,255,255,0.6)';
      }
    }

    if (!isDown || !loadedImage) return;

    if (currentTool === 'cursor') {
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      panX += dx;
      panY += dy;
      applyTransform();
      lastX = e.clientX;
      lastY = e.clientY;
    } else if (currentTool === 'green') {
      stampLine(lastX, lastY, pos.x, pos.y, 1);
      lastX = pos.x;
      lastY = pos.y;
    } else if (currentTool === 'red') {
      stampLine(lastX, lastY, pos.x, pos.y, 0);
      lastX = pos.x;
      lastY = pos.y;
    } else if (currentTool === 'rect') {
      rectCurX = pos.x;
      rectCurY = pos.y;
      rectPreviewEl.classList.toggle('deselect', e.altKey);
      updateRectPreview();
    } else if (currentTool === 'crop') {
      rectCurX = pos.x;
      rectCurY = pos.y;
      updateRectPreview();
    } else if (currentTool === 'pen' || currentTool === 'eraser') {
      annotationCtx.lineTo(pos.x, pos.y);
      annotationCtx.stroke();
      lastX = pos.x;
      lastY = pos.y;
    }
  });

  viewport.addEventListener('pointerup', (e) => {
    let modified = false;
    if (isDown) {
      if (currentTool === 'pen' || currentTool === 'eraser') {
        annotationCtx.globalCompositeOperation = 'source-over';
        modified = true;
      } else if (currentTool === 'rect') {
        const rx1 = Math.min(rectStartX, rectCurX);
        const ry1 = Math.min(rectStartY, rectCurY);
        const rx2 = Math.max(rectStartX, rectCurX);
        const ry2 = Math.max(rectStartY, rectCurY);
        if (rx2 - rx1 >= 1 && ry2 - ry1 >= 1) {
          saveMaskState();
          stampRect(rectStartX, rectStartY, rectCurX, rectCurY, e.altKey ? 0 : 1);
          modified = true;
        }
        rectPreviewEl.style.display = 'none';
      } else if (currentTool === 'crop') {
        const rx1 = Math.max(0, Math.floor(Math.min(rectStartX, rectCurX)));
        const ry1 = Math.max(0, Math.floor(Math.min(rectStartY, rectCurY)));
        const rx2 = Math.min(imgWidth, Math.ceil(Math.max(rectStartX, rectCurX)));
        const ry2 = Math.min(imgHeight, Math.ceil(Math.max(rectStartY, rectCurY)));
        if (rx2 - rx1 >= 2 && ry2 - ry1 >= 2) {
          const newBounds = { x: rx1, y: ry1, w: rx2 - rx1, h: ry2 - ry1 };
          const cur = cropBounds;
          const same = cur && cur.x === newBounds.x && cur.y === newBounds.y && cur.w === newBounds.w && cur.h === newBounds.h;
          if (!same) {
            saveCropState();
            cropBounds = newBounds;
            updateCropBorder();
            modified = true;
          }
        }
        rectPreviewEl.classList.remove('crop');
        rectPreviewEl.style.display = 'none';
      } else if (currentTool === 'green' || currentTool === 'red') {
        modified = true;
      }
    }
    isDown = false;
    if (currentTool === 'cursor') {
      viewport.style.cursor = 'grab';
    }
    if (modified) triggerAutoSync();
  });

  // --- Wheel: brush size for brush tools, zoom otherwise (or with Ctrl) ---
  const BRUSH_TOOLS = new Set(['green', 'red', 'pen', 'eraser']);

  viewport.addEventListener('wheel', (e) => {
    if (!loadedImage) return;
    e.preventDefault();

    const isBrushTool = BRUSH_TOOLS.has(currentTool);

    if (isBrushTool && !e.ctrlKey && !e.metaKey) {
      const step = e.deltaY < 0 ? 25 : -25;
      adjustBrush(step);
      const diameter = effectiveDiameter() * scale;
      brushCursorEl.style.width = diameter + 'px';
      brushCursorEl.style.height = diameter + 'px';
      return;
    }

    const oldScale = scale;
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    scale = Math.min(10, Math.max(0.05, scale * factor));

    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    panX = mx - (mx - panX) * (scale / oldScale);
    panY = my - (my - panY) * (scale / oldScale);

    applyTransform();
  }, { passive: false });

  // --- Reveal all / Hide all ---
  revealAllBtn.addEventListener('click', () => {
    if (!maskData) return;
    saveMaskState();
    maskData.fill(1);
    fillMaskSolid(1);
    triggerAutoSync();
  });
  hideAllBtn.addEventListener('click', () => {
    if (!maskData) return;
    saveMaskState();
    maskData.fill(0);
    fillMaskSolid(0);
    triggerAutoSync();
  });
  clearCropBtn.addEventListener('click', () => {
    if (!cropBounds) return;
    saveCropState();
    cropBounds = null;
    updateCropBorder();
    triggerAutoSync();
  });

  // --- Build revealed image (used by Send and Export) ---
  function buildRevealedCanvas() {
    const off = document.createElement('canvas');
    off.width = imgWidth;
    off.height = imgHeight;
    const ctx = off.getContext('2d');
    ctx.drawImage(imageCanvas, 0, 0);
    const imgPixels = ctx.getImageData(0, 0, imgWidth, imgHeight);
    const d = imgPixels.data;
    for (let i = 0; i < maskData.length; i++) {
      if (maskData[i] === 0) d[i * 4 + 3] = 0;
    }
    ctx.putImageData(imgPixels, 0, 0);
    return off;
  }

  // --- Project save/load (image + mask + annotations) ---
  function loadImageFromUrl(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function maskToCanvas() {
    const c = document.createElement('canvas');
    c.width = imgWidth; c.height = imgHeight;
    const ctx = c.getContext('2d');
    const id = ctx.createImageData(imgWidth, imgHeight);
    const d = id.data;
    for (let i = 0; i < maskData.length; i++) {
      const v = maskData[i] * 255;
      d[i*4] = v; d[i*4+1] = v; d[i*4+2] = v; d[i*4+3] = 255;
    }
    ctx.putImageData(id, 0, 0);
    return c;
  }

  function projectFileBaseName() {
    const name = (fileNameEl.textContent || '').trim();
    if (!name) return 'map-project';
    const dot = name.lastIndexOf('.');
    const base = dot > 0 ? name.slice(0, dot) : name;
    return base.replace(/\.mrp$/i, '') || 'map-project';
  }

  savePrjBtn.addEventListener('click', () => {
    if (!loadedImage || !maskData) return;
    const project = {
      type: 'maprevealer-project',
      version: 1,
      width: imgWidth,
      height: imgHeight,
      image: imageCanvas.toDataURL('image/png'),
      mask: maskToCanvas().toDataURL('image/png'),
      annotations: annotationCanvas.toDataURL('image/png'),
      crop: cropBounds
    };
    const blob = new Blob([JSON.stringify(project)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = projectFileBaseName() + '.mrp';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });

  loadPrjBtn.addEventListener('click', () => prjInput.click());

  prjInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) loadProjectFile(file);
    prjInput.value = '';
  });

  async function loadProjectFile(file) {
    let proj;
    try {
      const text = await file.text();
      proj = JSON.parse(text);
      if (!proj || proj.type !== 'maprevealer-project') throw new Error('bad type');
      if (!proj.width || !proj.height || !proj.image || !proj.mask || !proj.annotations) throw new Error('missing fields');
    } catch (err) {
      const t = LANGS[langSelect.value] || LANGS.en;
      showToast(t.importError || 'Invalid file');
      return;
    }

    let imgEl, maskImg, annImg;
    try {
      [imgEl, maskImg, annImg] = await Promise.all([
        loadImageFromUrl(proj.image),
        loadImageFromUrl(proj.mask),
        loadImageFromUrl(proj.annotations)
      ]);
    } catch (err) {
      const t = LANGS[langSelect.value] || LANGS.en;
      showToast(t.importError || 'Invalid file');
      return;
    }

    imgWidth = proj.width;
    imgHeight = proj.height;
    [imageCanvas, maskCanvas, annotationCanvas].forEach(c => { c.width = imgWidth; c.height = imgHeight; });

    imageCtx.drawImage(imgEl, 0, 0);

    // Decode mask: R channel > 127 means selected (1)
    const tmp = document.createElement('canvas');
    tmp.width = imgWidth; tmp.height = imgHeight;
    const tctx = tmp.getContext('2d');
    tctx.drawImage(maskImg, 0, 0);
    const md = tctx.getImageData(0, 0, imgWidth, imgHeight).data;
    maskData = new Uint8Array(imgWidth * imgHeight);
    for (let i = 0; i < maskData.length; i++) {
      maskData[i] = md[i*4] > 127 ? 1 : 0;
    }
    renderMaskRegion(0, 0, imgWidth, imgHeight);

    annotationCtx.clearRect(0, 0, imgWidth, imgHeight);
    annotationCtx.drawImage(annImg, 0, 0);

    loadedImage = imgEl;
    history = []; redoStack = []; historyBytes = 0; redoBytes = 0;
    updateUndoRedoButtons();

    cropBounds = null;
    if (proj.crop && typeof proj.crop === 'object') {
      const cx = proj.crop.x | 0, cy = proj.crop.y | 0;
      const cw = proj.crop.w | 0, ch = proj.crop.h | 0;
      if (cw > 0 && ch > 0 && cx >= 0 && cy >= 0 && cx + cw <= imgWidth && cy + ch <= imgHeight) {
        cropBounds = { x: cx, y: cy, w: cw, h: ch };
      }
    }
    updateCropBorder();

    placeholder.style.display = 'none';
    fileNameEl.textContent = file.name;

    const vw = viewport.clientWidth, vh = viewport.clientHeight;
    scale = Math.min(vw / imgWidth, vh / imgHeight) * 0.95;
    panX = (vw - imgWidth * scale) / 2;
    panY = (vh - imgHeight * scale) / 2;
    applyTransform();

    openOrReusePreview();
    triggerAutoSync();
  }

  // --- Export PNG (revealed image + annotations flattened) ---
  exportBtn.addEventListener('click', () => {
    if (!loadedImage || !maskData) return;
    const off = buildRevealedCanvas();
    off.getContext('2d').drawImage(annotationCanvas, 0, 0);
    let exportSrc = off;
    if (cropBounds) {
      const c = document.createElement('canvas');
      c.width = cropBounds.w;
      c.height = cropBounds.h;
      c.getContext('2d').drawImage(off, -cropBounds.x, -cropBounds.y);
      exportSrc = c;
    }
    exportSrc.toBlob((blob) => {
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'map-revealed.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  });

  // --- Send to preview (with ready handshake, zero-copy ImageBitmap) ---
  function doPost(payload) {
    const { msg, transferables } = payload;
    if (transferables && transferables.length) {
      previewWindow.postMessage(msg, '*', transferables);
    } else {
      previewWindow.postMessage(msg, '*');
    }
  }

  function postToPreview(msg, transferables) {
    const payload = { msg, transferables };
    if (previewReady && previewWindow && !previewWindow.closed) {
      doPost(payload);
    } else {
      // Drop any queued message: the queued bitmaps would otherwise leak if superseded.
      if (pendingMessage && pendingMessage.transferables) {
        pendingMessage.transferables.forEach(t => { if (t && t.close) t.close(); });
      }
      pendingMessage = payload;
    }
  }

  window.addEventListener('message', (e) => {
    if (!e.data || e.data.type !== 'ready') return;
    if (previewWindow && e.source === previewWindow) {
      previewReady = true;
      if (pendingMessage) {
        doPost(pendingMessage);
        pendingMessage = null;
      }
    }
  });

  async function doSend(silent) {
    if (!loadedImage || !maskData) return;
    clearTimeout(autoSyncTimer);

    openOrReusePreview();

    const off = buildRevealedCanvas();
    const cb = cropBounds;
    const [revealedBmp, annotationBmp] = await Promise.all([
      cb ? createImageBitmap(off, cb.x, cb.y, cb.w, cb.h) : createImageBitmap(off),
      cb ? createImageBitmap(annotationCanvas, cb.x, cb.y, cb.w, cb.h) : createImageBitmap(annotationCanvas)
    ]);

    const msg = {
      type: 'mapUpdate',
      revealed: revealedBmp,
      annotations: annotationBmp,
      width: cb ? cb.w : imgWidth,
      height: cb ? cb.h : imgHeight
    };

    postToPreview(msg, [revealedBmp, annotationBmp]);

    if (!silent) {
      const t = LANGS[langSelect.value] || LANGS.en;
      showToast(t.sent || 'Sent');
    }
  }

  sendBtn.addEventListener('click', () => doSend(false));

  function triggerAutoSync() {
    if (!autoSync || !loadedImage) return;
    clearTimeout(autoSyncTimer);
    autoSyncTimer = setTimeout(() => doSend(true), AUTO_SYNC_DELAY);
  }

  function setAutoSync(on, fromUser) {
    autoSync = !!on;
    autoSyncBtn.classList.toggle('active', autoSync);
    try { localStorage.setItem('mapeditor_autosync', autoSync ? '1' : '0'); } catch(e) {}
    if (!autoSync) clearTimeout(autoSyncTimer);
    if (fromUser) {
      const t = LANGS[langSelect.value] || LANGS.en;
      showToast(autoSync ? (t.autoSyncOn || 'Auto sync ON') : (t.autoSyncOff || 'Auto sync OFF'));
      if (autoSync) triggerAutoSync();
    }
  }

  autoSyncBtn.addEventListener('click', () => setAutoSync(!autoSync, true));

  try {
    if (localStorage.getItem('mapeditor_autosync') === '1') setAutoSync(true, false);
  } catch(e) {}

  // --- Keyboard shortcuts ---
  let toolBeforeSpace = null;

  function isTypingTarget(el) {
    if (!el) return false;
    const tag = el.tagName;
    return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || el.isContentEditable;
  }

  function adjustBrush(sliderDelta) {
    const cur = parseInt(brushSizeInput.value);
    const next = Math.min(SLIDER_MAX, Math.max(0, cur + sliderDelta));
    brushSizeInput.value = next;
    syncBrushFromSlider();
  }

  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
      const k = e.key.toLowerCase();
      if (k === 'z' && e.shiftKey) { e.preventDefault(); redoAction(); return; }
      if (k === 'z') { e.preventDefault(); undoAction(); return; }
      if (k === 'y') { e.preventDefault(); redoAction(); return; }
      if (k === 's') { e.preventDefault(); sendBtn.click(); return; }
      if (k === 'o') { e.preventDefault(); fileInput.click(); return; }
      return;
    }

    if (isTypingTarget(e.target)) return;

    if (e.code === 'Space' && !e.repeat) {
      e.preventDefault();
      if (currentTool !== 'cursor') {
        toolBeforeSpace = currentTool;
        selectTool('cursor');
      }
      return;
    }

    if (e.key === 'Escape') { selectTool('cursor'); return; }

    if (e.key === '[') { adjustBrush(-25); return; }
    if (e.key === ']') { adjustBrush(25); return; }

    if (e.key === '1') selectTool('cursor');
    else if (e.key === '2') selectTool('green');
    else if (e.key === '3') selectTool('red');
    else if (e.key === '4') selectTool('pen');
    else if (e.key === '5') selectTool('eraser');
    else if (e.key === '6') selectTool('rect');
    else if (e.key === '7') selectTool('crop');
    else {
      const k = e.key.toLowerCase();
      if (k === 'v') selectTool('cursor');
      else if (k === 's') selectTool('green');
      else if (k === 'd') selectTool('red');
      else if (k === 'p') selectTool('pen');
      else if (k === 'e') selectTool('eraser');
      else if (k === 'r') selectTool('rect');
      else if (k === 'c') selectTool('crop');
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.code === 'Space' && toolBeforeSpace) {
      selectTool(toolBeforeSpace);
      toolBeforeSpace = null;
    }
  });

  function selectTool(tool) {
    currentTool = tool;
    toolButtons.forEach(b => {
      b.classList.toggle('active', b.dataset.tool === tool);
    });
    updateCursorStyle();
  }

  viewport.addEventListener('pointerleave', () => {
    brushCursorEl.style.display = 'none';
  });

  updateCursorStyle();
})();
</script>
</body>
</html>
